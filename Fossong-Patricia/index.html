<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV — Membre Numero81</title>
  <!-- Le CSS est partagé : on remonte d'un niveau -->
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <div class="member-page">

    <!-- Bouton retour -->
    <a class="back-btn" href="../index.html">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Retour au groupe
    </a>

    <!-- Language toggle -->
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="fr">FR</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>

    <!-- HERO -->
    <div class="member-hero">
      <div id="photoWrap"></div>

      <div class="member-hero-info">
        <div class="member-name"  id="heroName"></div>
        <div class="member-role"  id="heroRole"></div>

        <div class="member-info-grid" id="infoGrid"></div>

        <p class="member-bio-short" id="heroBio"></p>

        <div class="skills-wrap" id="heroSkills"></div>
      </div>
    </div>

    <!-- CONTENU PROFIL -->
    <div class="profile-content">
      <div class="section-title" style="display:flex; align-items:center; gap:12px;">
        <b>À propos</b>
              </div>
      <p id="fullBio" style="font-size:15px;line-height:1.8;color:var(--text);margin-bottom:36px"></p>

      <div class="section-title"><b>Compétences</b></div>
      <div class="skills-wrap" id="skillsFull"></div>

      <div class="section-title"><b>Expériences &amp; Formations</b></div>
      <div class="timeline" id="timeline"></div>

      <div class="section-title"><b>Vidéo de présentation</b></div>
      <video id="memberVideo" class="member-video" controls>
        Votre navigateur ne supporte pas la vidéo HTML5.
      </video>

      <div class="section-title"><b>Message audio</b></div>
      <div class="audio-wrap">
        <span class="audio-label">Écoute le message de <span id="audioName"></span></span>
              </div>
    </div>

  </div><!-- /member-page -->

  <!-- Données personnelles du membre -->
  <script src="data.js"></script>

  <!-- Logique d'affichage -->
  <script>
    let currentLang = 'fr';

    /* ── Titre de l'onglet ── */
    document.title = 'CV — ' + MEMBER.name;
    document.documentElement.style.setProperty('--accent', MEMBER.color || '#c8f060');

    /* ── Photo ── */
    const photoWrap = document.getElementById('photoWrap');
    const img = document.createElement('img');
    img.className  = 'member-hero-photo';
    img.src        = 'photo.jpg';
    img.alt        = MEMBER.name;
    img.onerror    = function () {
      this.remove();
      const ph = document.createElement('div');
      ph.className   = 'member-hero-placeholder';
      ph.style.color = MEMBER.color || '#c8f060';
      ph.textContent = MEMBER.initials || '??';
      photoWrap.appendChild(ph);
    };
    photoWrap.appendChild(img);

    /* ── Fonction pour mettre à jour les textes selon la langue ── */
    function updateTexts() {
      const lang = currentLang;
      const suffix = lang === 'en' ? '_en' : '';

      document.getElementById('heroName').textContent = MEMBER['name' + suffix] || MEMBER.name;
      document.getElementById('heroRole').textContent = MEMBER['role' + suffix] || MEMBER.role;
      document.getElementById('heroBio').textContent  = MEMBER['bio' + suffix] || MEMBER.bio;
      document.getElementById('fullBio').textContent  = MEMBER['bio' + suffix] || MEMBER.bio;

      /* Info grid */
      const infoGrid = document.getElementById('infoGrid');
      const labels = lang === 'en' ? ['Specialty', 'City', 'Email', 'Phone'] : ['Spécialité', 'Ville', 'Email', 'Téléphone'];
      infoGrid.innerHTML = '';
      [
        { label: labels[0], value: MEMBER['specialty' + suffix] || MEMBER.specialty },
        { label: labels[1], value: MEMBER['city' + suffix] || MEMBER.city },
        { label: labels[2], value: MEMBER.email },
        { label: labels[3], value: MEMBER.phone },
      ].forEach(item => {
        infoGrid.innerHTML += `
          <div class="info-item">
            <div class="info-item-label">${item.label}</div>
            <div class="info-item-value">${item.value}</div>
          </div>`;
      });

      /* Compétences */
      function renderSkills(targetId) {
        const el = document.getElementById(targetId);
        el.innerHTML = '';
        const skills = MEMBER['skills' + suffix] || MEMBER.skills || [];
        skills.forEach(s => {
          const span = document.createElement('span');
          span.className   = 'skill-tag';
          span.textContent = s;
          el.appendChild(span);
        });
      }
      renderSkills('heroSkills');
      renderSkills('skillsFull');

      /* Timeline parcours */
      const timeline = document.getElementById('timeline');
      timeline.innerHTML = '';
      const parcours = MEMBER.parcours_scolaire || MEMBER.parcours || [];
      parcours.forEach((entry, index) => {
        const entryDiv = document.createElement('div');
        entryDiv.className = 'timeline-entry';
        entryDiv.dataset.time = entry.time || '00:00';
        entryDiv.innerHTML = `
          <div class="timeline-dot" style="background:${MEMBER.color || '#c8f060'}"></div>
          <div class="timeline-content">
            <div class="timeline-title">${entry['title' + suffix] || entry.title}</div>
            <div class="timeline-sub">${entry['sub' + suffix] || entry.sub}</div>
            <div class="timeline-desc">${entry['desc' + suffix] || entry.desc}</div>
          </div>
        `;
        timeline.appendChild(entryDiv);
      });
    }

    /* ── Vidéo & Audio ── */
    if (MEMBER.video) document.getElementById('memberVideo').src = MEMBER.video;

    /* ── Language toggle ── */
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentLang = btn.dataset.lang;
        updateTexts();
      });
    });

    /* ── Initial update ── */
    updateTexts();
  </script>

</body>
</html>
